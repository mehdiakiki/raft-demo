version: '3.8'

services:
  node-a:
    image: ${RAFT_CORE_NODE_IMAGE:-ghcr.io/medvih/raft-core-node:latest}
    command: ["--id=A","--addr=:60051","--peers=B=node-b:60052,C=node-c:60053,D=node-d:60054,E=node-e:60055","--log-level=debug"]
    expose: ["60051"]

  node-b:
    image: ${RAFT_CORE_NODE_IMAGE:-ghcr.io/medvih/raft-core-node:latest}
    command: ["--id=B","--addr=:60052","--peers=A=node-a:60051,C=node-c:60053,D=node-d:60054,E=node-e:60055","--log-level=debug"]
    expose: ["60052"]

  node-c:
    image: ${RAFT_CORE_NODE_IMAGE:-ghcr.io/medvih/raft-core-node:latest}
    command: ["--id=C","--addr=:60053","--peers=A=node-a:60051,B=node-b:60052,D=node-d:60054,E=node-e:60055","--log-level=debug"]
    expose: ["60053"]

  node-d:
    image: ${RAFT_CORE_NODE_IMAGE:-ghcr.io/medvih/raft-core-node:latest}
    command: ["--id=D","--addr=:60054","--peers=A=node-a:60051,B=node-b:60052,C=node-c:60053,E=node-e:60055","--log-level=debug"]
    expose: ["60054"]

  node-e:
    image: ${RAFT_CORE_NODE_IMAGE:-ghcr.io/medvih/raft-core-node:latest}
    command: ["--id=E","--addr=:60055","--peers=A=node-a:60051,B=node-b:60052,C=node-c:60053,D=node-d:60054","--log-level=debug"]
    expose: ["60055"]

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    command: ["--addr=:9000","--nodes=A=node-a:60051,B=node-b:60052,C=node-c:60053,D=node-d:60054,E=node-e:60055","--log-level=debug"]
    ports:
      - "8080:9000"
    depends_on: [node-a,node-b,node-c,node-d,node-e]

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_GATEWAY_URL: http://localhost:8080
        NEXT_PUBLIC_GATEWAY_WS: ws://localhost:8080/ws
    ports:
      - "3000:3000"
    depends_on: [gateway]
